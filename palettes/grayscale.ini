# ============================================================================
# trimvaldi palette — GRAYSCALE (zero-blue)   [default]
# ----------------------------------------------------------------------------
# THE canonical source for this palette. Hand-authored; everything else is
# generated from it by tools/build-palette.py ([ADR-0008]):
#
#     palettes/grayscale.ini          ← you are here, the only place to edit
#            ├──→ css/20-palette.css          --tf-* tokens   (GENERATED)
#            └──→ palettes/grayscale.theme.json  Vivaldi theme (GENERATED)
#
# Never edit either output. Run the generator.
#
# WHY A THEME AND NOT JUST CSS: Vivaldi computes ~117 --color* properties and
# writes them as an inline style on #browser, which CSS cannot override without
# !important on every one. But it DERIVES all 117 from ~5 seed colours, so the
# palette ships as a native Vivaldi theme ([ADR-0007]). The seeds below feed it.
#
# To make a new palette: copy this file, change the values, re-run the
# generator. Names are shared with trimfox on purpose — a palette should be
# legible in both projects.
# ============================================================================

[meta]
name = grayscale
description = zero-blue, every stock accent neutralised to gray

# ── DARK ────────────────────────────────────────────────────────────────────
# trimfox's dark ramp, lifted UNIFORMLY by +10 (0x0a).
#
# Why lifted: Vivaldi derives its ramp by offsetting DOWN from the surface and
# assumes roughly its own base's headroom (#363536 = 54/255). At trimfox's
# #202020 (32/255) the bottom rung clipped to pure #000000.
#
# Why uniformly: trimfox's GAPS are the design; its absolute values are not.
# Lifting only the surface would have squeezed surface->raised from 14 to 4 and
# flattened the contrast that makes hover and selection legible.
# Gaps preserved exactly: 10 / 4 / 14 / 39.
#
# We take Vivaldi's luminance headroom and NEVER its cast — Vivaldi's own base
# #363536 is non-neutral and its foreground #d3d9e3 is openly blue.
[dark]
field   = #1c1c1c
content = #262626
surface = #2a2a2a
raised  = #383838
select  = #5f5f5f

# Neutral gray, deliberately IDENTICAL in light and dark: it reads on both, and
# a single accent is one less thing to keep in sync.
accent        = #707070
accent-hover  = #808080
accent-active = #606060

text     = #ffffff
text-dim = #aaaaaa

# Translucent overlay for an unfocused window. The focused variants are DERIVED
# in CSS rather than stored here — see the generator's DERIVED list.
highlight-inactive = rgba(255, 255, 255, 0.05)

# Fixed glyph ink for the nav dash and menu accent bar; a near-white that reads
# on dark chrome. Attention badges reuse it so notifications never reintroduce
# a colour the palette spent effort removing.
glyph     = #d4d4d4
attention = #d4d4d4

# ── LIGHT — the grayscale ramp INVERTED ─────────────────────────────────────
# NOT lifted. Vivaldi's own light base (#f5f5f5) is BRIGHTER than trimfox's
# #ececec, so the headroom already runs the safe direction here.
[light]
field   = #ffffff
content = #f7f7f7
surface = #ececec
raised  = #dcdcdc
select  = #b8b8b8

accent        = #707070
accent-hover  = #808080
accent-active = #606060

text     = #111111
text-dim = #666666

highlight-inactive = rgba(0, 0, 0, 0.05)

glyph     = #333333
attention = #333333
